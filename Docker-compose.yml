services:
  node-app:
    container_name: container-one-test
    build: .
    volumes:
      - ./:/app:ro
    ports:
      - "4000:4000"
    env_file:
      - ./.env
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example